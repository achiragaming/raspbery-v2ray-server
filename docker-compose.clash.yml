---
name: clash

networks:
  clash_net:
    external: true
    name: clash_net

services:
  clash:
    build:
      context: .
      dockerfile: Dockerfile
    image: clash-mihomo:latest
    container_name: clash
    hostname: clash
    restart: unless-stopped

    networks:
      clash_net:
        ipv4_address: ${CLASH_IP}

    volumes:
      - ./clash/config:/root/.config/mihomo
      - ./clash/profiles:/profiles:ro
      - /dev/net/tun:/dev/net/tun

    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_BIND_SERVICE
      - SYS_PTRACE

    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.forwarding=1

    environment:
      GATEWAY_IP: ${LAN_GATEWAY}

    env_file:
      - .env
