---
# =============================================================================
# docker-compose.pihole.yml
# Pi-hole on pihole_net → macvlan-pihole → enp2s0
# Secrets loaded from .env file
# =============================================================================
name: pihole

networks:
  pihole_net:
    external: true
    name: pihole_net

services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    hostname: pihole
    restart: unless-stopped

    networks:
      pihole_net:
        ipv4_address: ${PIHOLE_IP}

    env_file:
      - .env

    environment:
      TZ: ${TZ}
      FTLCONF_webserver_api_password: ${PIHOLE_PASSWORD}
      FTLCONF_dns_upstreams: ${CLASH_IP}
      FTLCONF_dns_dnssec: "false"
      FTLCONF_dns_bogusPriv: "true"
      FTLCONF_dns_fqdnRequired: "true"
      FTLCONF_dns_listeningMode: "all"
      FTLCONF_dns_revServers: "false"
      FTLCONF_misc_etc_hosts: "false"

      FTLCONF_dhcp_active: "true"
      FTLCONF_dhcp_start: ${DHCP_START}
      FTLCONF_dhcp_end: ${DHCP_END}
      FTLCONF_dhcp_router: ${CLASH_IP}
      FTLCONF_dhcp_leaseTime: ${DHCP_LEASE_TIME:-24h}
      FTLCONF_dhcp_domain: ${DHCP_DOMAIN:-lan}

    volumes:
      - pihole_data:/etc/pihole
      - pihole_dnsmasq:/etc/dnsmasq.d
      - /etc/localtime:/etc/localtime:ro

    cap_add:
      - NET_ADMIN
      - NET_BIND_SERVICE
      - CHOWN
      - SETFCAP
      - SETUID
      - SETGID
      - DAC_OVERRIDE

volumes:
  pihole_data:
  pihole_dnsmasq:
