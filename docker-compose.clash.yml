---
# =============================================================================
# docker-compose.clash.yml
# Clash Meta (mihomo) on clash_net → macvlan-clash → HOST_IFACE
# Gateway is set by entrypoint.sh — NOT by Docker (macvlan limitation)
# =============================================================================
name: clash

networks:
  clash_net:
    external: true
    name: clash_net

services:
  clash:
    build:
      context: ./clash
      dockerfile: Dockerfile
    image: clash-mihomo:latest
    container_name: clash
    hostname: clash
    restart: unless-stopped

    networks:
      clash_net:
        ipv4_address: ${CLASH_IP}

    volumes:
      - ./clash/config:/root/.config/mihomo
      - ./clash/profiles:/profiles:ro
      - /dev/net/tun:/dev/net/tun

    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN        # ip route, iptables, TUN
      - NET_BIND_SERVICE # bind ports < 1024
      - SYS_PTRACE       # mihomo process inspection
    ulimits:
      nofile:
        soft: 1000000
        hard: 1000000
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.forwarding=1

    environment:
      GATEWAY_IP: ${LAN_GATEWAY}
      PIHOLE_IP:  ${PIHOLE_IP}
      CLASH_IP:   ${CLASH_IP}

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/configs", "-O", "/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    env_file:
      - .env
