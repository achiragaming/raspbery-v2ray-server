proxies:
  - name: "My-VPS-SG"
    type: vless
    server: xx.xx.xx.xx
    port: 443
    uuid: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    tls: true
    udp: true
    network: tcp
    servername: aka.ms
    skip-cert-verify: true

